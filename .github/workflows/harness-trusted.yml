name: harness-trusted

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  public-trusted-suite:
    name: Public trusted suite (L2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # agent-kit/skills is a submodule; symlink-health + install need it.
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Agent-kit install (skills surface for symlink-health)
        run: |
          # Fresh clone has no platform skill links; render local methodology skills only
          # (optional plugins need network clone — not required for public suite green path).
          for c in cursor claude codex codex-native; do
            CLIENT=$c bash tools/harness/agent-kit.sh install
          done

      - name: Public trusted suite
        run: bash tools/harness/test-harness.sh
